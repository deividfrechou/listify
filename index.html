<!DOCTYPE html>
<!-- Listify — Lista de Compras Inteligente -->
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- Configuração de viewport para dispositivos móveis:
         - viewport-fit=cover               : lê área segura (notch iOS)
         - interactive-widget=resizes-content : Android/Chrome encolhe a página
           quando o teclado abre, dividindo a tela com ele -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">

    <!-- Cor da barra do navegador no Android -->
    <meta name="theme-color" content="#2563eb">

    <!-- Permite salvar como aplicativo na tela inicial (Android e iOS) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Título na aba do navegador -->
    <title>Listify</title>

    <!-- Favicon: ícone exibido na aba do navegador e favoritos.
         Gerado a partir do arquivo icone.png (carrinho Listify). -->
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <!-- Apple touch icon: ícone ao salvar na tela inicial do iPhone/iPad -->
    <link rel="apple-touch-icon" href="icone.png">

    <!-- Folha de estilos externa -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <!-- ══════════════════════════════════════
         PÁGINA PRINCIPAL
    ══════════════════════════════════════ -->
    <div class="pagina">

        <!-- Cabeçalho com a identidade visual do Listify:
             ícone do carrinho ao lado do nome com gradiente azul→verde -->
        <header class="cabecalho">
            <img src="icone.png" alt="Logo Listify" class="logo-icone">
            <h1 class="logo-texto">Listify</h1>
        </header>


        <!-- ── Caixa de entrada: adicionar itens ── -->
        <div class="caixa" id="caixaEntrada">

            <!-- Campo de texto + botão Adicionar.
                 enterkeyhint="done": botão Enter do teclado virtual vira "Concluído" -->
            <div class="entrada-texto">
                <input
                    type="text"
                    id="campoTexto"
                    placeholder="Digite um item..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                    enterkeyhint="done"
                >
                <button class="btn-adicionar" id="btnAdicionar">Adicionar</button>
            </div>

            <!-- Linha divisória com texto entre texto e microfone -->
            <div class="separador">ou use o microfone</div>

            <!-- Botão do microfone (segure para falar, solte para adicionar) -->
            <div class="entrada-voz">
                <button id="btnMicrofone" class="btn-microfone" title="Segure para falar, solte para adicionar">
                    <img src="microphone.png" alt="Microfone" class="icone-microfone">
                </button>
                <div id="status" class="status">Segure o microfone e fale</div>
            </div>

        </div><!-- fim caixaEntrada -->


        <!-- ── Caixa da lista de itens ── -->
        <div class="caixa">

            <!-- Lista preenchida dinamicamente pelo JavaScript.
                 Cada item tem: nome (clicável para marcar/desmarcar)
                              + preço em verde (clicável para abrir modal de edição)
                              + botão excluir com ícone verde -->
            <ul id="lista"></ul>

            <!-- Total somado automaticamente -->
            <div id="total" class="total">Total: R$ 0,00</div>

        </div><!-- fim caixa lista -->


        <!-- ── Botão de impressão ── -->
        <div class="area-impressao">
            <button class="btn-imprimir" id="btnImprimir">
                <!-- Ícone SVG de impressora — herda cor do botão via currentColor -->
                <svg viewBox="0 0 24 24" class="icone-impressora" aria-hidden="true">
                    <path d="M18,3H6V7H18M19,12A1,1 0 0,1 18,11A1,1 0 0,1 19,12M16,19H8V15H16M19,8H5A3,3 0 0,0 2,11V17H6V21H18V17H22V11A3,3 0 0,0 19,8Z"/>
                </svg>
                Imprimir Lista
            </button>
        </div>

    </div><!-- fim .pagina -->


    <!-- ══════════════════════════════════════
         MODAL UNIFICADO — Editar item

         Abre ao clicar no PREÇO de qualquer item da lista.
         Reúne edição de NOME e VALOR em uma única janela,
         com o cursor iniciando automaticamente no campo de valor.

         Fluxo:
           1. Usuário toca no preço do produto
           2. Modal abre com nome e preço preenchidos
           3. Cursor já está no campo "Valor (R$)" — foco automático
           4. Usuário ajusta nome e/ou valor
           5. Confirmar salva; Cancelar descarta
    ══════════════════════════════════════════ -->
    <div id="modalEditar" class="modal">
        <div class="modal-conteudo">

            <div class="modal-titulo">Editar Item</div>

            <!-- Campo do nome do produto -->
            <label class="modal-label" for="campoEditarNome">Nome do produto</label>
            <input
                type="text"
                id="campoEditarNome"
                class="modal-input"
                autocomplete="off"
                enterkeyhint="next"
                placeholder="Ex: Arroz, Leite, Pão..."
            >

            <!-- Campo do valor — recebe o foco ao abrir o modal -->
            <label class="modal-label" for="campoEditarPreco">Valor (R$)</label>
            <input
                type="number"
                id="campoEditarPreco"
                class="modal-input"
                step="0.01"
                min="0"
                inputmode="decimal"
                enterkeyhint="done"
                placeholder="0,00"
            >

            <!-- Botões Cancelar e Confirmar -->
            <div class="modal-botoes">
                <button class="btn-modal btn-cancelar" id="cancelarEditar">Cancelar</button>
                <button class="btn-modal btn-confirmar" id="confirmarEditar">Confirmar</button>
            </div>

        </div>
    </div><!-- fim #modalEditar -->


    <!-- Script carregado no final: todos os elementos HTML já existem ao executar -->
    <script src="aplicativo.js"></script>

</body>
</html>
