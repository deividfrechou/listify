<!DOCTYPE html>
<!-- Declaração do tipo de documento: informa ao navegador que este é um arquivo HTML5 -->

<html lang="pt-BR">
<!-- Elemento raiz da página. lang="pt-BR" indica o idioma Português do Brasil -->

<head>
    <!-- Seção de configurações e metadados — não aparece visualmente na página -->

    <!-- Suporte a letras acentuadas e caracteres especiais -->
    <meta charset="UTF-8">

    <!-- Configuração de visualização para dispositivos móveis:
         - width=device-width: largura da página igual à largura do dispositivo
         - initial-scale=1.0: zoom inicial de 100%
         - maximum-scale=1.0: impede zoom acidental em campos de texto no iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <!-- Cor da barra do navegador em dispositivos Android -->
    <meta name="theme-color" content="#4285f4">

    <!-- Permite salvar a página na tela inicial como aplicativo (Android) -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Permite salvar a página na tela inicial como aplicativo (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Estilo da barra de status do iOS ao abrir como app -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Título exibido na aba do navegador -->
    <title>Lista de Compras</title>

    <!-- Importa a folha de estilos externa -->
    <link rel="stylesheet" href="estilos.css">

</head>

<body>
    <!-- Corpo da página — tudo que o usuário vê está aqui -->

    <!-- Div central que limita e centraliza o conteúdo na tela -->
    <div class="pagina">

        <!-- Título principal -->
        <h1>Lista de Compras</h1>

        <!-- Caixa de entrada: agrupa as formas de adicionar itens -->
        <div class="caixa">

            <!-- Seção de entrada por texto: campo + botão Adicionar -->
            <div class="entrada-texto">

                <!-- Campo onde o usuário digita o item.
                     - autocomplete, autocorrect e spellcheck desativados
                       para evitar sugestões indesejadas no celular -->
                <input
                    type="text"
                    id="campoTexto"
                    placeholder="Digite um item..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                >

                <!-- Botão que aciona a adição do item digitado -->
                <button class="btn-adicionar" id="btnAdicionar">Adicionar</button>

            </div><!-- fim .entrada-texto -->

            <!-- Linha divisória entre as duas formas de entrada -->
            <div class="separador">ou use o microfone</div>

            <!-- Seção de entrada por voz: botão do microfone + status -->
            <div class="entrada-voz">

                <!-- Botão do microfone — pressione e segure para falar.
                     Usa a imagem microphone.png como ícone -->
                <button id="btnMicrofone" class="btn-microfone" title="Pressione e segure para falar">
                    <img src="microphone.png" alt="Microfone" class="icone-microfone">
                </button>

                <!-- Texto que informa o estado atual do microfone.
                     Atualizado dinamicamente pelo JavaScript -->
                <div id="status" class="status">Pressione e segure para falar</div>

            </div><!-- fim .entrada-voz -->

        </div><!-- fim .caixa (entrada) -->


        <!-- Caixa da lista: exibe os itens adicionados e o total -->
        <div class="caixa">

            <!-- Lista onde os itens são inseridos dinamicamente pelo JavaScript -->
            <ul id="lista"></ul>

            <!-- Exibe a soma dos preços de todos os itens -->
            <div id="total" class="total">Total: R$ 0,00</div>

        </div><!-- fim .caixa (lista) -->


        <!-- Botão de impressão da lista.
             Ao clicar, o JavaScript chama window.print() para abrir o diálogo de impressão.
             O CSS de impressão (no estilos.css) controla o que aparece na folha impressa -->
        <div class="area-impressao">
            <button class="btn-imprimir" id="btnImprimir">
                <!-- Ícone de impressora desenhado em SVG para melhor qualidade -->
                <svg viewBox="0 0 24 24" class="icone-impressora">
                    <path d="M18,3H6V7H18M19,12A1,1 0 0,1 18,11A1,1 0 0,1 19,12M16,19H8V15H16M19,8H5A3,3 0 0,0 2,11V17H6V21H18V17H22V11A3,3 0 0,0 19,8Z" />
                </svg>
                Imprimir Lista
            </button>
        </div><!-- fim .area-impressao -->

    </div><!-- fim .pagina -->


    <!-- ===================================================
         MODAIS
         Janelas flutuantes para editar nome e preço.
         Começam ocultas e são exibidas pelo JavaScript.
    =================================================== -->

    <!-- Modal para editar o nome de um item -->
    <div id="modalEditar" class="modal">
        <div class="modal-conteudo">
            <div class="modal-titulo">Editar Item</div>
            <input type="text" id="campoEditar" autocomplete="off">
            <div class="modal-botoes">
                <button class="btn-modal btn-cancelar" id="cancelarEditar">Cancelar</button>
                <button class="btn-modal btn-confirmar" id="confirmarEditar">Confirmar</button>
            </div>
        </div>
    </div><!-- fim #modalEditar -->

    <!-- Modal para editar o preço de um item -->
    <div id="modalPreco" class="modal">
        <div class="modal-conteudo">
            <div class="modal-titulo">Editar Preço</div>
            <!-- inputmode="decimal" abre teclado numérico com vírgula no celular -->
            <input type="number" step="0.01" min="0" id="campoPreco" inputmode="decimal">
            <div class="modal-botoes">
                <button class="btn-modal btn-cancelar" id="cancelarPreco">Cancelar</button>
                <button class="btn-modal btn-confirmar" id="confirmarPreco">Confirmar</button>
            </div>
        </div>
    </div><!-- fim #modalPreco -->


    <!-- JavaScript importado no final do body para garantir que o HTML
         já esteja carregado antes de o script ser executado -->
    <script src="aplicativo.js"></script>

</body>

</html>
